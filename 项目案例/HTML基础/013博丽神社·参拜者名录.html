<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博丽神社·参拜者名录</title>
</head>

<body>
    <!-- h1 定义页面主标题 -->
    <h1>⛩️ 博丽神社 · 今日参拜者名录</h1>
    <p><em>记录幻想乡居民的日常打卡情况</em></p>

    <hr>

    <!-- 
      table 标签：整个表格的容器
    -->
    <table border="1" cellpadding="5" cellspacing="0">

        <!-- thead：表头区域，通常包含列标题 -->
        <thead>
            <tr>
                <th>姓名</th>
                <th>种族</th>
                <th>赛钱金额</th>
                <th>备注</th>
            </tr>
        </thead>

        <!-- tbody：表体部分，包含主要的数据行 -->
        <tbody>
            <tr>
                <td>雾雨魔理沙</td>
                <td>人类</td>
                <td>1枚铜币</td>
                <td>借走了《魔法基础入门》，未归还</td>
            </tr>
            <tr>
                <td>琪露诺</td>
                <td>妖精</td>
                <td>冰块 x 3</td>
                <td>试图用冰块支付被灵梦拒绝</td>
            </tr>
            <tr>
                <td>八云紫</td>
                <td>妖怪</td>
                <td>黄金 1kg</td>
                <td>神出鬼没，突然出现又消失</td>
            </tr>
        </tbody>

        <!-- tfoot：表尾部分，常用于统计信息或合计行 -->
        <tfoot>
            <tr>
                <!-- colspan="4" 表示这个单元格横跨4列 -->
                <td colspan="4"><strong>今日总计：</strong> 3位访客 | 实际赛钱收入：极低</td>
            </tr>
        </tfoot>
    </table>

    <hr>
    <p><small>⚠️ 巫女日志：今天又是穷得吃土的一天，为什么有钱的妖怪都不愿意往赛钱箱里投钱啊！</small></p>
</body>

</html>
