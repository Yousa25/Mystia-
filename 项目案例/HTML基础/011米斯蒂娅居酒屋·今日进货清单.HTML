<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>米斯蒂娅居酒屋·今日进货清单</title>
</head>

<body>
    <!-- h1 定义页面主标题 -->
    <h1>🏮 夜雀食堂 · 今日进货清单</h1>
    <p><em>老板娘米斯蒂娅亲自盘点，新鲜出炉！</em></p>

    <hr>

    <!-- 
      ul (unordered list)：无序列表，适合做没有先后顺序的菜单分类
    -->
    <ul>
        <!-- 第一大类：酒水饮料 -->
        <li>
            <strong>【酒水饮料类】</strong>
            <!-- 嵌套一个子列表 ol (ordered list)，这里用有序列表表示酒水的倒酒/品尝顺序或推荐等级 -->
            <ol>
                <li>十四夜（店长强烈推荐，口感醇厚）</li>
                <li>雀酒（本店招牌特色酿制）</li>
                <li>普通清酒（人类村落批发）</li>
            </ol>
        </li>

        <!-- 第二大类：烤串小吃 -->
        <li>
            <strong>【烤串小吃类】</strong>
            <!-- 继续嵌套一个无序列表 ul -->
            <ul>
                <li>秘制烤鸟蛋（每桌必点！）</li>
                <li>爆炒肉丝</li>
                <li>炭烤蘑菇</li>
            </ul>
        </li>

        <!-- 第三大类：主食类 -->
        <li>
            <strong>【主食类】</strong>
            <ul>
                <li>妖怪特制拉面</li>
                <li>海鲜炒饭</li>
            </ul>
        </li>
    </ul>

    <hr>
    <p><small>⚠️ 进货备注：今天去人类村落进货时，差点被魔理沙抢走两瓶十四夜，下次必须多备货！</small></p>
</body>

</html>
