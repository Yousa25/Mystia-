<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS选择器</title>
    <style>
        div {
            color: red;
            font-size: 50px;

        }

        p {
            color: lightblue;
            font-size: 20px;

        }

        .伙伴 {
            color: pink;
            font-size: 50px;
        }
    </style>
</head>

<body>
    <h2>妖怪兽道</h2>
    <p>妖怪兔</p>
    <p>妖怪狐</p>
    <p>妖怪猫</p>
    <p>妖怪狸</p>
    <div>莉格露</div>
    <div>露米娅</div>
    <div class="伙伴"> 幽谷响子</div>
    <div> 橙</div>
    <div class="伙伴">本居小玲 </div>
    <div class="伙伴">十六夜咲夜 </div>
</body>

</html>
