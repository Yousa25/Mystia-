<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莉格露喜好标签</title>
    <style>
        .like {
            background-color: rgb(230, 180, 166);
            border-color: rgb(157, 84, 55);
            color: rgb(131, 0, 0);
            border-width: 1px;
            border-radius: .25rem;
            font-weight: 400;
        }

        .dislike {
            background-color: rgb(93, 69, 58);
            border-color: rgb(0, 0, 0);
            color: rgb(230, 180, 166);
            border-width: 1px;
            border-radius: .25rem;
            font-weight: 400;
        }

        .drink-like {
            background-color: rgb(176, 207, 215);
            border-color: rgb(111, 146, 155);
            color: rgb(164, 92, 34);
            border-width: 1px;
            border-radius: .25rem;
            font-weight: 400;
        }

        .background {
            background-color: black;
            width: 300px;
        }
    </style>
</head>

<body>

    <div class="background">
        <div class="food">
            <span class="like">·猎奇</span>
            <span class="like">·肉</span>
            <span class="like">·生<sub>（生肉总比熟肉好吃）</sub></span>
            <span class="like">·甜</span>
        </div>
        <div class="food">
            <span class="dislike">凉爽X</span>
            <span class="dislike">清淡X</span>
            <span class="dislike">素X</span>
        </div>
        <div class="drinks">
            <span class="drink-like">·低酒精</span>
            <span class="drink-like">·可加冰</span>
        </div>
    </div>


</body>

</html>
