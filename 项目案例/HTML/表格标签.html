<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表格标签</title>
</head>

<body>

    <table border="1" cellpadding="0" cellspacing="0" width="800px">
        <thead>
            <tr>
                <td colspan="2" align="center" bgcolor="lightgrey">基本信息</td>
            </tr>
        </thead>
        <tbody align="left">
            <tr>
                <th>人物名</th>
                <td>米斯蒂娅·萝蕾拉</td>
            </tr>
            <tr>
                <th>日文名</th>
                <td>ミスティア・ローレライ</td>
            </tr>
            <tr>
                <th>英文名</th>
                <td>Mystia Lorelei</td>
            </tr>
            <tr>
                <th>种族</th>
                <td>夜雀（永夜抄）<br />
                    妖怪（人妖名鉴）</td>
            </tr>
            <tr>
                <th>能力</th>
                <td>用歌声诱人发狂程度的能力（永夜抄、花映塚角色设定、幻存神签）<br />
                    用歌声迷惑人程度的能力（花映塚Manual、求闻史纪、人妖名鉴）</td>
            </tr>
        </tbody>
    </table>
</body>

</html>
