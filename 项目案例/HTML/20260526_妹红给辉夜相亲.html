<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给蓬莱山辉夜找对象咯！</title>
</head>

<body>
    <h1>有一老不死，给其相亲，快来注册，她长这样</h1>
    <img src="../images/蓬莱山辉夜（永夜抄立绘）.png" alt="怎么还不去死">
    <br>
    <table>
        <thead>
            <h1>这老不死的信息</h1>
        </thead>
        <tr>
            <td>
                <label for="第一印象">
                    第一印象：
                </label>
            </td>
            <td>
                <label for="男娘">
                    <input type="radio" name="第一印象" id="男娘"> 男娘
                </label>


                <label for="蓬莱山效应犯了">
                    <input type="radio" name="第一印象" id=" 蓬莱山效应犯了"> 蓬莱山效应犯了
                </label>
            </td>
        </tr>
        <tr>
            <td>生日：</td>
            <td>
                <select name="年龄" id="age">
                    <option value="maxAge">上不封顶</option>
                    <option value="1W">可能1万岁</option>
                    <option value="2W">或者2万岁</option>
                    <option value="NW">反正死不了</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><label for="住址">她住在：</label></td>
            <td>迷途竹林</td>
        </tr>
        <tr>
            <td>
                你会喜欢的她的性格：
            </td>
            <td>
                <input type="checkbox" name="性格" id="家里蹲"><label for="家里蹲">家里蹲</label>

                <input type="checkbox" name="性格" id="刁难别人"><label for="刁难别人">刁难别人</label>

                <input type="checkbox" name="性格" id="年龄大"><label for="年龄大">年龄大</label>

                <input type="checkbox" name="性格" id="粗暴"><label for="粗暴">粗暴</label>

                <input type="checkbox" name="性格" id="没洗过澡"><label for="没洗过澡">没洗过澡</label>

                <input type="checkbox" name="性格" id="爱吃竹筒饭" checked="checked"><label for="爱吃竹筒饭">爱吃竹筒饭</label>
            </td>
        </tr>
        <tr>
            <td><label for="她的自述">她的自述</label></td>
            <td><textarea name="她的自述" id="她的自述" rows="10"
                    cols="30">感谢妹红爸爸给我找对象！我爱妹红爸爸，妹红爸爸对不起都是我以前不好，玫红爸爸我会给你天天洗脚</textarea>
            </td>
        </tr>
        <tr>
            <td><input type="button" value="免费辉夜点击就送"></td>
            <td>不点也送</td>
        </tr>
    </table>
    <h3>你承诺</h3>
    <ul>
        <li>每天家暴几次，打不过可以叫我</li>
        <li>不给她吃东西，非要喂她找我要</li>
        <li>不用喜欢，当纪念品就行</li>
    </ul>

</body>

</html>
